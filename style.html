<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Scientific Calculator</title>

<style>
body{
  margin:0;
  height:110vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#7fb6c9;
  font-family:Arial;
}

/* MAIN CALC */
.calc{
  width:320px;
  background:#e6e6e6;
  border:4px solid #2b2b2b;
  border-radius:25px;
  padding:15px;
  box-shadow: inset 0 3px 8px rgba(0,0,0,0.3);
}

/* TOP BAR */
.top-bar{
  height:20px;
  background:#3a1f1f;
  border-radius:4px;
  margin-bottom:8px;
}

/* TITLE */
.title{
  font-size:16px;
  margin:5px 0;
}

/* DISPLAY */
#display{
  width:95%;
  height:60px;
  border:none;
  border-radius:6px;
  background:#cfd3d4;
  font-size:22px;
  text-align:right;
  padding:10px;
  margin-bottom:10px;
}

/* TOP BUTTONS */
.top-row{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:6px;
  margin-bottom:10px;
}

.top-row button{
  padding:8px;
  background:#b9bfc2;
  border:none;
  font-size:12px;
}

/* SCIENCE + PAD AREA */
.middle{
  display:flex;
  gap:12px;
}

/* SCIENCE BUTTONS */
.science{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:6px;
}

.science button{
  width:50px;
  height:35px;
  background:#7f8c8d;
  border:none;
  color:black;
  font-size:14px;
  border-radius:5px;
}

/* CIRCLE PAD */
.pad{
  display:flex;
  justify-content:center;
  align-items:center;
}

.circle{
  width:100px;
  height:100px;
  border-radius:50%;
  background:#ddd;
  position:relative;
  box-shadow: inset 0 3px 6px rgba(0,0,0,0.4);
}

.circle button{
  position:absolute;
  width:25px;
  height:25px;
  border-radius:50%;
  background:#444;
  color:white;
  border:none;
}

.up{top:8px;left:40px;}
.down{bottom:8px;left:40px;}
.left{left:8px;top:40px;}
.right{right:8px;top:40px;}

/* NUMBERS */
.keys{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:8px;
  margin-top:12px;
}

.keys button{
  height:45px;
  border:none;
  background:#3f3f3f;
  color:white;
  font-size:16px;
  border-radius:5px;
}

.op{background:#2f2f2f;}
.equal{background:#1f1f1f;}
</style>
</head>

<body>

<div class="calc">

  <div class="top-bar"></div>
  <div class="title">Scientific Calculator</div>

  <input id="display" readonly>

  <!-- TOP BUTTONS -->
  <div class="top-row">
    <button>SHIFT</button>
    <button>ALPHA</button>
    <button>MODE</button>
    <button>ON</button>
  </div>

  <!-- SCIENCE + CIRCLE -->
  <div class="middle">

    <div class="science">
      <button>sin</button>
      <button>cos</button>
      <button>tan</button>
      <button>π</button>

      <button>log</button>
      <button>ln</button>
      <button>√</button>
      <button>xʸ</button>
    </div>

    <div class="pad">
      <div class="circle">
        <button class="up">▲</button>
        <button class="down">▼</button>
        <button class="left">◄</button>
        <button class="right">►</button>
      </div>
    </div>

  </div>

  <!-- KEYPAD -->
  <div class="keys">

    <button onclick="append('7')">7</button>
    <button onclick="append('8')">8</button>
    <button onclick="append('9')">9</button>
    <button class="op" onclick="clearAll()">AC</button>

    <button onclick="append('4')">4</button>
    <button onclick="append('5')">5</button>
    <button onclick="append('6')">6</button>
    <button class="op" onclick="del()">DEL</button>

    <button onclick="append('1')">1</button>
    <button onclick="append('2')">2</button>
    <button onclick="append('3')">3</button>
    <button class="op" onclick="append('*')">×</button>

    <button onclick="append('0')">0</button>
    <button onclick="append('.')">.</button>
    <button class="op" onclick="append('%')">%</button>
    <button class="op" onclick="append('/')">÷</button>

    <button class="op" onclick="append('-')">−</button>
    <button class="op" onclick="append('+')">+</button>
    <button class="op" onclick="append('**2')">x²</button>
    <button class="equal" onclick="calc()">=</button>

  </div>

</div>

<script>
let display = document.getElementById("display");

function append(val){
  display.value += val;
}

function clearAll(){
  display.value = "";
}

function del(){
  display.value = display.value.slice(0,-1);
}

function calc(){
  try{
    display.value = eval(display.value);
  }catch{
    display.value = "Error";
  }
}
</script>

</body>
</html>
